<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery A/S</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}

body{
  background:#EDEBE7;
  height:100vh;
  min-height:600px;
  font-family:'Jost',sans-serif;
  color:#2A2A2A;
  display:flex;
  flex-direction:column;
  overflow:hidden;
  user-select:none;
}

.nav{
  display:flex;align-items:center;justify-content:center;
  padding:1rem 1.5rem;flex-shrink:0;
}
.brand{text-align:center;}
.brand-name{
  font-family:'Cormorant Garamond',serif;
  font-size:40px;
  font-weight:400;
  line-height:1.15;
  letter-spacing:0.1em;
  text-transform:uppercase;
}

.cf-stage{
  flex:1;
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
  perspective:1100px;
  overflow:hidden;
}

.cf-track{
  position:relative;
  width:100%;
  height:90%;
  transform-style:preserve-3d;
}

.cf-card{
  position:absolute;
  top:50%;
  width:240px;
  height:320px;
  margin-top:-160px;
  left:50%;
  margin-left:-120px;
  overflow:hidden;
  cursor:pointer;
  transform-origin:center center;
  transition:transform 0.55s cubic-bezier(0.25,0.46,0.45,0.94),
             opacity 0.55s ease,
             box-shadow 0.55s ease;
  will-change:transform,opacity;
  background:#E2DFD8;
}

.cf-card img{
  width:100%;height:100%;object-fit:cover;display:block;pointer-events:none;
  opacity:0;
  transition:opacity 0.5s ease;
}
.cf-card img.loaded{opacity:1;}

.cf-card .cf-shine{
  position:absolute;inset:0;
  background:linear-gradient(105deg,rgba(255,255,255,0.18) 0%,transparent 60%);
  pointer-events:none;opacity:0;transition:opacity 0.4s;
}
.cf-card.side-left .cf-shine,
.cf-card.side-right .cf-shine{opacity:1;}

/* Loading skeleton + spinner */
.cf-loader{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  background:linear-gradient(110deg,#E2DFD8 8%,#EFEDE8 18%,#E2DFD8 33%);
  background-size:200% 100%;
  animation:shimmer 1.4s linear infinite;
  transition:opacity 0.4s ease;
  pointer-events:none;
}
.cf-loader.hide{opacity:0;}
@keyframes shimmer{
  0%{background-position:200% 0;}
  100%{background-position:-200% 0;}
}
.cf-spinner{
  width:26px;height:26px;
  border-radius:50%;
  border:2px solid rgba(42,42,42,0.15);
  border-top-color:rgba(42,42,42,0.55);
  animation:spin 0.8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}

.cf-caption{
  flex-shrink:0;text-align:center;
  padding:0.5rem 0 0.4rem;min-height:2.4rem;
}
.cf-caption-text{
  font-family:'Cormorant Garamond',serif;
  font-style:italic;font-size:30px;
  color:#171616;opacity:0.6;transition:opacity 0.3s;
}

.dots{
  flex-shrink:0;display:flex;align-items:center;
  justify-content:center;gap:6px;padding:0.5rem 0 0.6rem;
}
.dot{
  width:5px;height:5px;border-radius:50%;
  background:#2A2A2A;opacity:0.2;transition:all 0.3s;cursor:pointer;
}
.dot.active{opacity:0.75;width:20px;border-radius:3px;}

.arrow{
  position:absolute;top:50%;transform:translateY(-50%);
  background:none;border:0.5px solid rgba(42,42,42,0.3);
  width:34px;height:34px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;z-index:20;color:#2A2A2A;font-size:13px;
  transition:all 0.2s;
}
.arrow:hover{background:#2A2A2A;color:#EDEBE7;}
.arrow-left{left:14px;}
.arrow-right{right:14px;}

.tagline-strip{
  flex-shrink:0;border-top:0.5px solid rgba(42,42,42,0.18);
  text-align:center;padding:0.65rem 1rem 0.8rem;
}
.tagline-strip p{
  font-family:'Cormorant Garamond',serif;
  font-size:17px;font-weight:300;
  letter-spacing:0.05em;text-transform:uppercase;line-height:1.3;
}
.tagline-strip em{font-style:italic;text-transform:none;}
</style>
</head>
<body>

<nav class="nav">

  <div class="brand">
    
    <div class="brand-name">AYISHA<br>& SHABIN</div>
    
  </div>

</nav>

<div class="cf-stage" id="stage">
  <button class="arrow arrow-left" id="prev">&#8592;</button>
  <div class="cf-track" id="track"></div>
  <button class="arrow arrow-right" id="next">&#8594;</button>
</div>

<div class="cf-caption"><span class="cf-caption-text" id="cap"></span></div>
<div class="dots" id="dots"></div>

<div class="tagline-strip">
  <p>The beginning of forever</p>
</div>

<script>
// ── CONFIG — must match rsvp-dashboard.html ───────────────────────────────────
const SHEET_URL = 'https://script.google.com/macros/s/AKfycbwhU0ckuMvTb20TwBBcQeX-Z36H2l96LHCP2pDjFn-O2RuJ5tDS61U9KHpIK06jsH5q/exec';

// ── STATE ─────────────────────────────────────────────────────────────────────
let photos = [];   // [{src, cap}]  built from Drive API response
let N = 0;
let cur = 0, dragging = false, startX = 0, dragDelta = 0;

const track  = document.getElementById('track');
const dotsEl = document.getElementById('dots');
const capEl  = document.getElementById('cap');
const stage  = document.getElementById('stage');

// ── CAPTIONS — read from localStorage (set by rsvp-dashboard.html) ───────────
var DEFAULT_CAPS = ['WELLCOME','BRIDE','WE','DECIDED','TOGETHER','GROOM'];
var CAPTION_KEY  = 'gallery_captions_v1'; // must match rsvp-dashboard.html

function loadSavedCaptions() {
  try {
    var saved = localStorage.getItem(CAPTION_KEY);
    if (saved) {
      var parsed = JSON.parse(saved);
      if (Array.isArray(parsed) && parsed.length > 0) return parsed;
    }
  } catch(e) {}
  return DEFAULT_CAPS.slice();
}

var FIXED_CAPS = loadSavedCaptions();

// ── LOAD IMAGES FROM DRIVE ───────────────────────────────────────────────────
function buildCarousel(imgs) {
  // imgs = [{id, name, url}] from Apps Script  ?gallery=1
  photos = imgs.map(function(img, i) {
    var cap = FIXED_CAPS[i] !== undefined ? FIXED_CAPS[i] : ('PHOTO ' + (i + 1));
    return { src: img.url, cap: cap };
  });
  N = photos.length;
  cur = 0;

  // Clear old cards & dots
  track.innerHTML  = '';
  dotsEl.innerHTML = '';

  if (N === 0) {
    capEl.textContent = '';
    document.getElementById('prev').style.display = 'none';
    document.getElementById('next').style.display = 'none';
    // Show a friendly empty state in the stage
    const msg = document.createElement('div');
    msg.style.cssText = 'font-family:Cormorant Garamond,serif;font-style:italic;font-size:22px;color:#2A2A2A;opacity:0.4;text-align:center;padding:20px;';
    msg.textContent = 'No photos yet…';
    track.appendChild(msg);
    return;
  }

  document.getElementById('prev').style.display = '';
  document.getElementById('next').style.display = '';

  // Build cards
  photos.forEach(function(p, i) {
    const card = document.createElement('div');
    card.className = 'cf-card';
    card.innerHTML =
      '<div class="cf-loader"><div class="cf-spinner"></div></div>'
      + '<img src="' + p.src + '" alt="' + p.cap + '" crossorigin="anonymous">'
      + '<div class="cf-shine"></div>';

    const img    = card.querySelector('img');
    const loader = card.querySelector('.cf-loader');

    function markLoaded() {
      img.classList.add('loaded');
      loader.classList.add('hide');
    }
    if (img.complete && img.naturalWidth > 0) {
      markLoaded();
    } else {
      img.addEventListener('load', markLoaded);
      img.addEventListener('error', function() { loader.classList.add('hide'); });
    }

    card.addEventListener('click', function() { if (Math.abs(dragDelta) < 8) goTo(i); });
    track.appendChild(card);
  });

  // Build dots
  photos.forEach(function(_, i) {
    const d = document.createElement('div');
    d.className = 'dot';
    d.onclick = function() { goTo(i); };
    dotsEl.appendChild(d);
  });

  layout();
}

function loadGallery() {
  // Show a subtle loading state
  capEl.textContent = '';
  track.innerHTML = '<div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);"><div style="width:34px;height:34px;border-radius:50%;border:2px solid rgba(42,42,42,0.15);border-top-color:rgba(42,42,42,0.55);animation:spin 0.8s linear infinite;"></div></div>';

  fetch(SHEET_URL + '?gallery=1')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      buildCarousel(data.images || []);
    })
    .catch(function(err) {
      console.error('Gallery load error:', err);
      track.innerHTML = '';
      capEl.textContent = 'Could not load photos';
    });
}

// ── LAYOUT ────────────────────────────────────────────────────────────────────
function layout() {
  if (N === 0) return;
  const cards  = track.querySelectorAll('.cf-card');
  const stageW = stage.offsetWidth;
  const SPREAD  = Math.min(stageW * 0.18, 150);
  const SIDE_ROT = 52;
  const ACTIVE_Z = 200;
  const SIDE_Z   = -120;
  const FAR_Z    = -220;

  cards.forEach(function(card, i) {
    let offset = i - cur;
    if (offset >  N / 2) offset -= N;
    if (offset < -N / 2) offset += N;

    let tx, tz, ry, scale, opacity, zIndex;

    if (offset === 0) {
      tx=0; tz=ACTIVE_Z; ry=0; scale=1; opacity=1; zIndex=10;
      card.classList.remove('side-left','side-right');
    } else if (offset === 1) {
      tx=SPREAD*2.1; tz=SIDE_Z; ry=-SIDE_ROT; scale=0.72; opacity=0.9; zIndex=7;
      card.classList.add('side-right'); card.classList.remove('side-left');
    } else if (offset === -1) {
      tx=-SPREAD*2.1; tz=SIDE_Z; ry=SIDE_ROT; scale=0.72; opacity=0.9; zIndex=7;
      card.classList.add('side-left'); card.classList.remove('side-right');
    } else if (offset === 2) {
      tx=SPREAD*3.8; tz=FAR_Z; ry=-SIDE_ROT*1.1; scale=0.54; opacity=0.55; zIndex=4;
      card.classList.add('side-right'); card.classList.remove('side-left');
    } else if (offset === -2) {
      tx=-SPREAD*3.8; tz=FAR_Z; ry=SIDE_ROT*1.1; scale=0.54; opacity=0.55; zIndex=4;
      card.classList.add('side-left'); card.classList.remove('side-right');
    } else {
      tx=offset>0?SPREAD*5.5:-SPREAD*5.5; tz=FAR_Z-80; ry=offset>0?-70:70;
      scale=0.4; opacity=0; zIndex=1;
      card.classList.remove('side-left','side-right');
    }

    card.style.transform = 'translateX('+tx+'px) translateZ('+tz+'px) rotateY('+ry+'deg) scale('+scale+')';
    card.style.opacity   = opacity;
    card.style.zIndex    = zIndex;
  });

  document.querySelectorAll('.dot').forEach(function(d, i) {
    d.classList.toggle('active', i === cur);
  });
  capEl.textContent = photos[cur] ? photos[cur].cap : '';
}

function goTo(idx) {
  if (N === 0) return;
  cur = ((idx % N) + N) % N;
  layout();
}

// ── CONTROLS ──────────────────────────────────────────────────────────────────
document.getElementById('prev').onclick = function() { goTo(cur - 1); };
document.getElementById('next').onclick = function() { goTo(cur + 1); };

stage.addEventListener('mousedown',  function(e) { dragging=true; startX=e.clientX; dragDelta=0; });
stage.addEventListener('touchstart', function(e) { dragging=true; startX=e.touches[0].clientX; dragDelta=0; }, {passive:true});
stage.addEventListener('mousemove',  function(e) { if(!dragging)return; dragDelta=e.clientX-startX; });
stage.addEventListener('touchmove',  function(e) { if(!dragging)return; dragDelta=e.touches[0].clientX-startX; }, {passive:true});

function endDrag() {
  if (!dragging) return; dragging=false;
  if (dragDelta < -50) goTo(cur+1);
  else if (dragDelta > 50) goTo(cur-1);
  dragDelta=0;
}
stage.addEventListener('mouseup',    endDrag);
stage.addEventListener('mouseleave', endDrag);
stage.addEventListener('touchend',   endDrag);

document.addEventListener('keydown', function(e) {
  if (e.key==='ArrowLeft')  goTo(cur-1);
  if (e.key==='ArrowRight') goTo(cur+1);
});

window.addEventListener('resize', layout);

// ── BOOT ──────────────────────────────────────────────────────────────────────
loadGallery();
</script>
</body>
</html>
